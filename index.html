<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Forja de Donaciones · Carta al lado del %</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: black;
      font-family: 'Cinzel', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 980px;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .title, .title-sub { display: none; }

    /* BARRA */
    .bar-section {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      position: relative;
      overflow: visible;
    }

    .bar-labels {
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      margin-bottom: 12px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .bar-meta {
      font-size: .8rem;
      color: #c9ad7a;
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 12px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bar-goal-label { color: #b38b5a; }
    .bar-goal { font-size: .9rem; color: #ffbb66; font-weight: bold; }
    .btn-toggle-meta {
      background: transparent;
      border: 1px solid #7a552e;
      color: #cb9a62;
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 40px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.1em;
      transition: 0.2s;
    }
    .btn-toggle-meta:hover { background: #2a1a0a; border-color: #ff9141; color: #ffcc88; }
    .bar-meta.hidden-meta .bar-goal,
    .bar-meta.hidden-meta .bar-goal-label { display: none; }

    /* TRACK */
    .bar-track {
      width: 100%;
      height: 90px;
      border-radius: 60px;
      border: 2px solid #854e24;
      position: relative;
      overflow: visible;
      box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.9), inset 0 -2px 8px rgba(255, 120, 0, .2), 0 0 0 2px #2f1808;
      background: #0a0502;
      margin: 12px 0 6px;
    }
    .bar-track::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 240, .05) 0%, transparent 40%, rgba(0, 0, 0, .65) 100%);
      z-index: 3;
      pointer-events: none;
      border-radius: 60px;
    }

    /* RELLENO LAVA */
    .bar-fill {
      height: 100%;
      border-radius: 60px;
      position: relative;
      z-index: 2;
      transition: width 0.9s cubic-bezier(0.34, 1.2, 0.55, 1);
      background: url('lava.gif') repeat-x center / auto 100%;
      background-color: #ff5e00;
      box-shadow: 0 0 20px #ff6a1f, inset 0 2px 6px rgba(255, 220, 120, .7), inset 0 -3px 8px rgba(100, 20, 0, .8);
      overflow: visible;
      min-width: 0;
      max-width: none;
    }
    .bar-fill::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 45px 28px at 15% 55%, rgba(255, 220, 130, 0.4) 0%, transparent 70%),
                  radial-gradient(ellipse 30px 22px at 45% 40%, rgba(255, 180, 70, 0.3) 0%, transparent 70%);
      animation: lavaSwirl 2.4s ease-in-out infinite alternate;
      pointer-events: none;
      border-radius: 60px;
    }
    .bar-fill::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 0;
      bottom: 0;
      width: 24px;
      background: radial-gradient(ellipse 28px 100% at 100% 50%, rgba(255, 255, 180, 0.95) 0%, rgba(255, 100, 0, 0.7) 40%, transparent 90%);
      filter: blur(4px);
      animation: magmaGlow 1.3s infinite alternate;
      border-radius: 60px;
    }
    @keyframes lavaSwirl {
      0% { opacity: 0.5; transform: translateX(-4px); }
      100% { opacity: 0.9; transform: translateX(8px); }
    }
    @keyframes magmaGlow {
      0% { opacity: 0.6; width: 20px; right: -4px; }
      100% { opacity: 1; width: 32px; right: -6px; }
    }

    /* MANOS */
    .hand-on-bar {
      position: absolute;
      z-index: 15;
      width: 95px;
      height: auto;
      filter: drop-shadow(0 0 6px rgba(255, 100, 0, 0.8));
      pointer-events: none;
      transition: all 0.2s ease;
    }
    .hand-top-left-bar { top: -50px; left: -45px; transform: rotate(-30deg); }
    .hand-bottom-right-bar { bottom: -48px; right: -75px; transform: rotate(20deg); }
    .bar-track:hover .hand-on-bar { filter: drop-shadow(0 0 12px #ff8833); }
    .bar-track:hover .hand-top-left-bar { transform: rotate(-8deg) scale(1.05); }
    .bar-track:hover .hand-bottom-right-bar { transform: rotate(8deg) scale(1.05); }

    /* CONTENEDOR CENTRAL: porcentaje + carta en la misma línea */
    .center-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
      gap: 12px;  /* Espacio entre el % y la carta */
    }

    /* PORCENTAJE */
    .bar-percent-center {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.9rem;
      font-weight: 900;
      color: #ffcc44;
      filter: drop-shadow(0 0 6px #ff5500);
      text-shadow: 0 0 18px #ff3c00, 0 2px 6px #2a0a00;
      letter-spacing: 0.06em;
      background: radial-gradient(ellipse 80% 60% at center, rgba(0, 0, 0, 0.25) 0%, transparent 70%);
      padding: 0 10px;
      z-index: 5;
      line-height: 1;
    }

    /* CARTA: al lado del porcentaje, visible al 15% */
    .carta-container {
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      pointer-events: none;
      filter: drop-shadow(0 2px 12px rgba(0, 0, 0, 0.9));
      flex-shrink: 0;
    }
    .carta-container.visible {
      opacity: 1;
      visibility: visible;
    }
    .carta-imagen {
      height: auto;
      max-height: 55px;
      width: auto;
      max-width: 55px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.7), 0 0 0 3px #ffcc88, 0 0 0 6px #7a3e1a;
      background: #2a1a0a;
      transition: transform 0.2s ease;
      object-fit: contain;
    }
    .bar-track:hover .carta-container .carta-imagen { transform: scale(1.04); }

    /* TICKER */
    .ticker-wrap {
      overflow: hidden;
      border-top: 1px solid #6a401e;
      padding-top: 14px;
      margin-top: 20px;
    }
    .ticker-label {
      font-size: .6rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: #daa15e;
      margin-bottom: 8px;
    }
    .ticker {
      display: flex;
      gap: 0;
      white-space: nowrap;
      width: 100%;
      overflow: hidden;
    }
    .ticker-inner {
      display: flex;
      gap: 40px;
      animation: scrollTicker 24s linear infinite;
    }
    @keyframes scrollTicker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .donor-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .85rem;
      background: rgba(26, 14, 5, 0.7);
      padding: 4px 16px;
      border-radius: 80px;
      backdrop-filter: blur(3px);
      border-left: 2px solid #ff7e2e;
    }
    .donor-chip .d-name { color: #ffbc6e; font-weight: 700; }
    .donor-chip .d-amt { color: #ffaa55; font-weight: bold; }

    /* PANEL */
    .panel {
      background: linear-gradient(145deg, #1f180e 0%, #0f0b05 100%);
      border: 2px solid #6a4022;
      border-radius: 28px;
      padding: 28px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px 28px;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, .7), 0 8px 24px rgba(0, 0, 0, .5);
    }
    .panel h2 {
      grid-column: 1 / -1;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1rem;
      letter-spacing: .2em;
      color: #ffaa55;
      border-bottom: 2px solid #905a30;
      padding-bottom: 10px;
      text-transform: uppercase;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #cb9a62;
    }
    input, select {
      background: #1f170c;
      border: 1px solid #7a552e;
      border-radius: 18px;
      color: #ffdeae;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      padding: 12px 16px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #ff9141;
      box-shadow: 0 0 0 3px rgba(255, 100, 0, 0.3);
    }
    select option { background: #1f170c; color: #ffdeae; }
    .btn {
      cursor: pointer;
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      transition: all 0.2s;
      font-weight: bold;
    }
    .btn:active { transform: scale(0.97); }
    .btn-donate {
      background: linear-gradient(115deg, #b82e00 0%, #ff6719 55%, #ffcd7a 100%);
      color: #2c0e00;
      box-shadow: 0 4px 18px rgba(255, 70, 0, 0.6);
    }
    .btn-donate:hover { filter: brightness(1.08); box-shadow: 0 6px 22px #ff7b2e; }
    .btn-goal {
      background: linear-gradient(135deg, #2f2418 0%, #4f3620 100%);
      color: #ffbc7a;
      border: 1px solid #b47134;
    }
    .btn-goal:hover { background: #614527; color: #ffdaaa; }
    .btn-reset {
      background: rgba(0, 0, 0, 0.5);
      color: #ca8e56;
      border: 1px solid #7a4f2a;
      backdrop-filter: blur(4px);
    }
    .btn-reset:hover { color: #ffbc7a; border-color: #ea923a; }
    .actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(145deg, #b33e0a, #ff8833);
      color: #fff3e5;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      padding: 12px 32px;
      border-radius: 50px;
      box-shadow: 0 10px 30px #ff5e1a;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
      font-weight: bold;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      .panel { grid-template-columns: 1fr; padding: 20px; }
      .bar-track { height: 70px; }
      .hand-on-bar { width: 46px; }
      .hand-top-left-bar { top: -12px; left: -8px; }
      .hand-bottom-right-bar { bottom: -12px; right: -8px; }
      .bar-percent-center { font-size: 1.2rem; }
      .carta-imagen { max-height: 40px; max-width: 40px; }
      .center-wrapper { gap: 8px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="bar-section">
    <div class="bar-labels">
      <span class="bar-meta" id="metaContainer">
        <span class="bar-goal-label">META:</span>
        <span class="bar-goal" id="goalDisplay">$10,000.00</span>
        <button class="btn-toggle-meta" id="toggleMetaBtn">👁️</button>
      </span>
    </div>

    <div class="bar-track">
      <!-- Manos -->
      <img class="hand-on-bar hand-top-left-bar" src="mano_izquierda.png" alt="mano izquierda">
      <img class="hand-on-bar hand-bottom-right-bar" src="mano_derecha.png" alt="mano derecha">

      <div class="bar-fill" id="fillBar" style="width: 0%">
        <!-- Contenedor central: % + carta en la misma línea -->
        <div class="center-wrapper">
          <!-- Porcentaje -->
          <span class="bar-percent-center" id="centerPercent">0%</span>
          <!-- Carta al lado del porcentaje -->
          <div id="cartaMagic" class="carta-container">
            <img class="carta-imagen" src="Carta.png" alt="Carta mágica">
          </div>
        </div>
      </div>
    </div>

    <div class="ticker-wrap">
      <div class="ticker-label">🔥 ÚLTIMOS DONANTES 🔥</div>
      <div class="ticker">
        <div class="ticker-inner" id="tickerInner">
          <span class="donor-chip" style="background:#301e0e;">🌋... 🌋</span>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="field"><label>🎯 META (USD)</label><input type="number" id="goalInput" placeholder="10000" min="1" step="100" value="10000"></div>
    <div class="field"><label>💰 TOTAL ACTUAL (USD)</label><input type="number" id="totalInput" placeholder="0" min="0" step="0.01" value="0"></div>
    
    <div class="field">
      <label>🧙 DONANTE</label>
      <input type="text" id="donorName" placeholder="Nombre">
    </div>
    <div class="field">
      <label>💎 MONTO DONACIÓN</label>
      <div style="display: flex; gap: 8px; align-items: center;">
        <select id="currencySelect" style="flex: 0 0 80px; padding: 10px 6px; background: #1f170c; border: 1px solid #7a552e; border-radius: 18px; color: #ffdeae; font-family: 'Cinzel', serif;">
          <option value="USD">USD $</option>
          <option value="MXN">MXN $</option>
          <option value="COP">COP $</option>
          <option value="ARS">ARS $</option>
          <option value="CLP">CLP $</option>
          <option value="PEN">PEN S/</option>
          <option value="BRL">BRL R$</option>
        </select>
        <input type="number" id="donationAmount" placeholder="0.00" min="0.01" step="0.01" style="flex:1;">
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-donate" id="donateBtn">🔥 DONAR 🔥</button>
      <button class="btn btn-goal" id="updateGoalBtn">⚡ ACTUALIZAR META</button>
      <button class="btn btn-reset" id="resetBtn">↺ REINICIAR</button>
    </div>
  </div>
</div>
<div class="toast" id="toastMsg"></div>

<script>
  // ---------- TASAS DE CAMBIO (aproximadas) ----------
  // ---------- TASAS DE CAMBIO (aproximadas) ----------
  let FX = { USD: 1 };

  async function fetchRealTimeRates() {
    try {
      const response = await fetch('https://api.frankfurter.app/latest?from=USD&to=MXN,COP,ARS,CLP,PEN,BRL');
      const data = await response.json();
      if (data.rates) {
        FX = {
          USD: 1,
          MXN: data.rates.MXN || 20.5,
          COP: data.rates.COP || 4200,
          ARS: data.rates.ARS || 950,
          CLP: data.rates.CLP || 950,
          PEN: data.rates.PEN || 3.8,
          BRL: data.rates.BRL || 5.6
        };
        console.log('💰 Tasas actualizadas:', FX);
      }
    } catch (error) {
      console.warn('⚠️ Error al obtener tasas, usando respaldo:', error);
      FX = { USD: 1, MXN: 20.5, COP: 4200, ARS: 950, CLP: 950, PEN: 3.8, BRL: 5.6 };
    }
  }

  fetchRealTimeRates();
  setInterval(fetchRealTimeRates, 300000);

  // ---------- ESTADO CON PERSISTENCIA ----------
  const STORAGE_KEY = 'forja_donaciones_data';
  function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch (e) { console.warn('Error cargando estado:', e); }
    return null;
  }
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        currentGoal, currentTotal, donorsList, cartaRevelada, metaVisible
      }));
    } catch (e) { console.warn('Error guardando estado:', e); }
  }

  // ---------- ESTADO ----------
  let currentGoal = 10000;
  let currentTotal = 0;
  let donorsList = [];
  let cartaRevelada = false;
  let metaVisible = true;

  const saved = loadState();
  if (saved) {
    currentGoal = saved.currentGoal || 10000;
    currentTotal = saved.currentTotal || 0;
    donorsList = saved.donorsList || [];
    cartaRevelada = saved.cartaRevelada || false;
    metaVisible = saved.metaVisible !== undefined ? saved.metaVisible : true;
  }

  // Elementos
  const fillBar = document.getElementById('fillBar');
  const centerPercentSpan = document.getElementById('centerPercent');
  const goalDisplaySpan = document.getElementById('goalDisplay');
  const goalInput = document.getElementById('goalInput');
  const totalInput = document.getElementById('totalInput');
  const donorNameInput = document.getElementById('donorName');
  const donationAmountInput = document.getElementById('donationAmount');
  const currencySelect = document.getElementById('currencySelect');
  const tickerInner = document.getElementById('tickerInner');
  const cartaContainer = document.getElementById('cartaMagic');
  const metaContainer = document.getElementById('metaContainer');
  const toggleMetaBtn = document.getElementById('toggleMetaBtn');

  const formatMoney = (val) => '$' + parseFloat(val).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  function showToast(msg) {
    const toast = document.getElementById('toastMsg');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2600);
  }

  function checkAndRevealCarta(percentValue) {
    if (cartaRevelada) return;
    if (percentValue >= 15) {
      cartaContainer.classList.add('visible');
      cartaRevelada = true;
      saveState();
      showToast("📜 ¡Una carta ancestral ha aparecido junto al porcentaje! (15% alcanzado)");
    }
  }

  function updateBarAndUI() {
    let percent = (currentTotal / currentGoal) * 100;
    const displayPercent = percent;
    const barWidthPercent = Math.min(100, percent);
    const percentRounded = Math.floor(displayPercent);

    centerPercentSpan.textContent = percentRounded + '%';
    fillBar.style.width = barWidthPercent + '%';
    goalDisplaySpan.textContent = formatMoney(currentGoal);
    totalInput.value = currentTotal.toFixed(2);
    goalInput.value = currentGoal;

    if (currentTotal >= currentGoal) {
      fillBar.style.filter = "drop-shadow(0 0 18px #ffaa44)";
      centerPercentSpan.style.textShadow = "0 0 22px #ffaa33, 0 0 10px #ff4400";
      centerPercentSpan.style.color = "#ffdd44";
    } else {
      fillBar.style.filter = "";
      centerPercentSpan.style.textShadow = "0 0 18px #ff3c00, 0 2px 6px #2a0a00";
      centerPercentSpan.style.color = "#ffcc44";
    }

    if (cartaRevelada) cartaContainer.classList.add('visible');
    else cartaContainer.classList.remove('visible');

    if (metaVisible) {
      metaContainer.classList.remove('hidden-meta');
      toggleMetaBtn.textContent = '👁️';
    } else {
      metaContainer.classList.add('hidden-meta');
      toggleMetaBtn.textContent = '🙈';
    }

    if (!cartaRevelada && percentRounded >= 15) {
      checkAndRevealCarta(percentRounded);
    }
    saveState();
  }

  function buildTicker() {
    if (!tickerInner) return;
    if (!donorsList.length) {
      tickerInner.innerHTML = '<span class="donor-chip">🌋 Esperando Héroes... 🌋</span>';
      tickerInner.classList.add('paused');
      return;
    }
    tickerInner.classList.remove('paused');
    const duplicated = [...donorsList, ...donorsList];
    tickerInner.innerHTML = duplicated.map((d, idx) => {
      const safeName = d.name.substring(0, 26).replace(/[&<>]/g, '');
      return `<span class="donor-chip">🔥 <span class="d-name">${safeName}</span> <span class="d-amt">${formatMoney(d.amount)}</span></span>${idx < duplicated.length-1 ? '<span style="color:#7a4a28;"> | </span>' : ''}`;
    }).join('');
  }

  // ---------- DONACIÓN CON DIVISA ----------
  function addDonation() {
    let donorName = donorNameInput.value.trim();
    if (donorName === "") donorName = "Anonimo";
    if (donorName.length > 28) donorName = donorName.slice(0, 26) + "..";

    const rawAmount = parseFloat(donationAmountInput.value);
    if (isNaN(rawAmount) || rawAmount <= 0) {
      showToast("⚠️ Ingresa un monto mayor a 0");
      return;
    }
    if (rawAmount > 500000) {
      showToast("💥 Monto máximo 500,000");
      return;
    }

    const currency = currencySelect.value;
    const rate = FX[currency] || 1;
    const amountInUSD = rawAmount / rate;

    if (amountInUSD < 0.001) {
      showToast("⚠️ El monto en USD es muy pequeño (< 0.001)");
      return;
    }

    const roundedUSD = Math.round(amountInUSD * 100) / 100;
    if (roundedUSD <= 0) {
      showToast("⚠️ El monto en USD es cero después de conversión");
      return;
    }

    currentTotal += roundedUSD;
    donorsList.unshift({ name: donorName, amount: roundedUSD });
    if (donorsList.length > 22) donorsList.pop();

    updateBarAndUI();
    buildTicker();

    donorNameInput.value = '';
    donationAmountInput.value = '';

    const newPercent = Math.floor((currentTotal / currentGoal) * 100);
    const symbol = currency === 'USD' ? '$' : (currency === 'PEN' ? 'S/' : (currency === 'BRL' ? 'R$' : '$'));
    showToast(`🔥 ${donorName} donó ${symbol}${rawAmount.toFixed(2)} (≈ ${formatMoney(roundedUSD)} USD) → ${newPercent}% de la meta 🔥`);
    if (currentTotal >= currentGoal) {
      showToast(`🏆 ¡META ALCANZADA! ${newPercent}% - La forja fulgura 🏆`);
    }
  }

  function updateGoal() {
    let newGoal = parseFloat(goalInput.value);
    if (isNaN(newGoal) || newGoal <= 0) {
      showToast("Meta inválida");
      return;
    }
    currentGoal = newGoal;
    const manualTotal = parseFloat(totalInput.value);
    if (!isNaN(manualTotal) && manualTotal >= 0) currentTotal = manualTotal;
    updateBarAndUI();
    const newPercent = Math.floor((currentTotal / currentGoal) * 100);
    showToast(`⚙️ Meta: ${formatMoney(currentGoal)} | Progreso: ${newPercent}%`);
  }

  function syncTotalFromInput() {
    let newTotal = parseFloat(totalInput.value);
    if (!isNaN(newTotal) && newTotal >= 0) {
      currentTotal = newTotal;
      updateBarAndUI();
      const newPercent = Math.floor((currentTotal / currentGoal) * 100);
      showToast(`📊 Recaudación: ${formatMoney(currentTotal)} (${newPercent}%)`);
    } else {
      totalInput.value = currentTotal.toFixed(2);
    }
  }

  function resetAll() {
    if (confirm("⚠️ ¿Reiniciar todo el progreso?")) {
      currentTotal = 0;
      donorsList = [];
      donorNameInput.value = "";
      donationAmountInput.value = "";
      cartaContainer.classList.remove('visible');
      cartaRevelada = false;
      updateBarAndUI();
      buildTicker();
      showToast("🌋 Forja reiniciada. Progreso: 0% | La carta desaparece hasta nuevo 15%");
    }
  }

  function toggleMeta() {
    metaVisible = !metaVisible;
    if (metaVisible) {
      metaContainer.classList.remove('hidden-meta');
      toggleMetaBtn.textContent = '👁️';
    } else {
      metaContainer.classList.add('hidden-meta');
      toggleMetaBtn.textContent = '🙈';
    }
    saveState();
  }

  // ---------- INICIO ----------
  document.addEventListener('DOMContentLoaded', () => {
    goalInput.value = currentGoal;
    totalInput.value = currentTotal.toFixed(2);
    if (cartaRevelada) cartaContainer.classList.add('visible');
    if (!metaVisible) {
      metaContainer.classList.add('hidden-meta');
      toggleMetaBtn.textContent = '🙈';
    }
    updateBarAndUI();
    buildTicker();

    document.getElementById('donateBtn').addEventListener('click', addDonation);
    document.getElementById('updateGoalBtn').addEventListener('click', updateGoal);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    totalInput.addEventListener('change', syncTotalFromInput);
    donationAmountInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addDonation(); });
    toggleMetaBtn.addEventListener('click', toggleMeta);
  });
</script>
</body>
</html>
